server.port=${PORT:8080}

# ── Database (Supabase PostgreSQL via PgBouncer) ──────────────────────────────
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&pgbouncer=true
spring.datasource.username=postgres.mwqidsomofhsbsrhddlk
spring.datasource.password=MINTYNEX@PRO1-2026
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=bWludHluZXhTdXBlclNlY3JldEtleUZvckpXVEF1dGgyMDI1TWludHlOZXg=
jwt.access-token-expiry-ms=3600000
jwt.refresh-token-expiry-ms=2592000000

# ── CORS ──────────────────────────────────────────────────────────────────────
# Add your Railway production URL here once deployed, e.g.:
#   cors.allowed-origins=http://localhost:5500,http://localhost:3000,https://your-app.up.railway.app
cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000

# ── Supabase Storage ─────────────────────────────────────────────────────────
# Required by SupabaseStorageService for uploading files to Storage buckets.
# Get the service_role key from: Supabase Dashboard → Project Settings → API
supabase.url=https://mwqidsomofhsbsrhddlk.supabase.co
supabase.service-role-key=YOUR_SERVICE_ROLE_KEY_HERE

# ── File Upload (Multipart) ───────────────────────────────────────────────────
# Max file size per request: 50MB (adjust to match your Supabase plan limits)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.mintynex=DEBUG
logging.level.org.springframework.security=WARN
